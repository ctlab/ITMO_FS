version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.12
    steps:
      - run:
          name: Checkout repository over HTTPS
          command: |
            mkdir -p ~/project
            git clone --depth 1 https://github.com/ctlab/ITMO_FS.git ~/project/ITMO_FS

      - run:
          name: Install uv
          command: |
            python -m pip install --upgrade pip
            pip install uv

      - run:
          name: Sync test environment
          command: |
            cd ~/project/ITMO_FS
            uv sync --no-default-groups --group test --group release

      - run:
          name: Run tests
          command: |
            cd ~/project/ITMO_FS
            uv run --no-sync pytest -q

workflows:
  main:
    jobs:
      - build-and-test
