version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - run:
          name: Download repository archive
          command: |
            rm -rf /tmp/itmo-fs-src
            mkdir -p /tmp/itmo-fs-src
            curl -fsSL "https://github.com/ctlab/ITMO_FS/archive/${CIRCLE_SHA1}.tar.gz" -o /tmp/itmo-fs-src/source.tar.gz
            tar -xzf /tmp/itmo-fs-src/source.tar.gz --strip-components=1 -C /tmp/itmo-fs-src
            cp -R /tmp/itmo-fs-src/. ~/project/
            test -f ~/project/pyproject.toml

      - run:
          name: Install uv
          command: |
            python -m pip install --upgrade pip
            pip install uv

      - run:
          name: Sync test environment
          command: |
            pwd
            ls -la
            test -f pyproject.toml
            uv sync --no-default-groups --group test --group release

      - run:
          name: Run tests
          command: |
            test -f pyproject.toml
            uv run --no-sync pytest -q

workflows:
  main:
    jobs:
      - build-and-test
