version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - run:
          name: Checkout repository over HTTPS
          command: |
            rm -rf ~/project/*
            git clone --depth 1 https://github.com/ctlab/ITMO_FS.git .

      - run:
          name: Install uv
          command: |
            python -m pip install --upgrade pip
            pip install uv

      - run:
          name: Sync test environment
          command: |
            pwd
            ls -la
            test -f pyproject.toml
            uv sync --no-default-groups --group test --group release

      - run:
          name: Run tests
          command: |
            test -f pyproject.toml
            uv run --no-sync pytest -q

workflows:
  main:
    jobs:
      - build-and-test
