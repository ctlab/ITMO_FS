version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - run:
          name: Checkout repository over HTTPS
          command: |
            git clone --depth 1 https://github.com/ctlab/ITMO_FS.git .

      - restore_cache:
          keys:
            - v2-python-3.12-{{ checksum "pyproject.toml" }}
            - v2-python-3.12-

      - run:
          name: Install uv
          command: |
            python -m pip install --upgrade pip
            pip install uv

      - run:
          name: Sync test environment
          command: |
            uv sync --no-default-groups --group test --group release

      - save_cache:
          key: v2-python-3.12-{{ checksum "pyproject.toml" }}
          paths:
            - .venv
            - uv.lock

      - run:
          name: Run tests
          command: uv run --no-sync pytest -q

workflows:
  main:
    jobs:
      - build-and-test
