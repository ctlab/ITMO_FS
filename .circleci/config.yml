version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout

      - restore_cache:
          keys:
            - v2-python-3.12-{{ checksum "pyproject.toml" }}
            - v2-python-3.12-

      - run:
          name: Install dependencies
          command: |
            python -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -e '.[dev,sci,imb,qp]'

      - save_cache:
          key: v2-python-3.12-{{ checksum "pyproject.toml" }}
          paths:
            - .venv

      - run:
          name: Run tests
          command: |
            . .venv/bin/activate
            pytest -q

workflows:
  main:
    jobs:
      - build-and-test
